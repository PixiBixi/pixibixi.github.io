<svg width="640" height="560" viewBox="0 0 640 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif">

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b949e"/>
    </marker>
  </defs>

  <!-- ── Box: event ── -->
  <rect x="80" y="16" width="480" height="52" fill="none" rx="8" stroke="#30363d" stroke-width="1.5"/>
  <rect x="80" y="16" width="4" height="52" fill="#8b949e" rx="2"/>
  <text x="320" y="47" font-size="14" fill="#e6edf3" font-weight="600" text-anchor="middle">push  ·  pull_request  (main / master)</text>

  <!-- Arrow: fan-out -->
  <line x1="320" y1="68" x2="320" y2="100" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="330" y="88" font-size="11" fill="#8b949e" text-anchor="start">6 workflows, en parallèle</text>

  <!-- ── Group A: gate ── -->
  <rect x="80" y="104" width="480" height="76" fill="none" rx="8" stroke="#30363d" stroke-width="1.5"/>
  <rect x="80" y="104" width="4" height="76" fill="#3fb950" rx="2"/>
  <text x="106" y="126" font-size="11" fill="#3fb950" font-weight="700" letter-spacing="0.5">GATE — bloque le merge</text>

  <rect x="106" y="140" width="92" height="24" fill="none" rx="12" stroke="#3fb950" stroke-width="1"/>
  <text x="152" y="156" font-size="11" fill="#3fb950" text-anchor="middle">test -race</text>
  <rect x="206" y="140" width="96" height="24" fill="none" rx="12" stroke="#3fb950" stroke-width="1"/>
  <text x="254" y="156" font-size="11" fill="#3fb950" text-anchor="middle">build ×3 OS</text>
  <rect x="310" y="140" width="112" height="24" fill="none" rx="12" stroke="#3fb950" stroke-width="1"/>
  <text x="366" y="156" font-size="11" fill="#3fb950" text-anchor="middle">golangci-lint</text>
  <rect x="430" y="140" width="104" height="24" fill="none" rx="12" stroke="#3fb950" stroke-width="1"/>
  <text x="482" y="156" font-size="11" fill="#3fb950" text-anchor="middle">govulncheck</text>

  <!-- ── Group B: reviewdog ── -->
  <rect x="80" y="192" width="480" height="64" fill="none" rx="8" stroke="#30363d" stroke-width="1.5"/>
  <rect x="80" y="192" width="4" height="64" fill="#f78166" rx="2"/>
  <text x="106" y="214" font-size="11" fill="#f78166" font-weight="700" letter-spacing="0.5">FEEDBACK PR — reviewdog (suggestions inline)</text>

  <rect x="106" y="226" width="100" height="24" fill="none" rx="12" stroke="#f78166" stroke-width="1"/>
  <text x="156" y="242" font-size="11" fill="#f78166" text-anchor="middle">goimports</text>
  <rect x="214" y="226" width="120" height="24" fill="none" rx="12" stroke="#f78166" stroke-width="1"/>
  <text x="274" y="242" font-size="11" fill="#f78166" text-anchor="middle">markdownlint</text>

  <!-- ── Group C: security ── -->
  <rect x="80" y="268" width="480" height="64" fill="none" rx="8" stroke="#30363d" stroke-width="1.5"/>
  <rect x="80" y="268" width="4" height="64" fill="#58a6ff" rx="2"/>
  <text x="106" y="290" font-size="11" fill="#58a6ff" font-weight="700" letter-spacing="0.5">SÉCURITÉ — onglet Security</text>

  <rect x="106" y="302" width="80" height="24" fill="none" rx="12" stroke="#58a6ff" stroke-width="1"/>
  <text x="146" y="318" font-size="11" fill="#58a6ff" text-anchor="middle">zizmor</text>
  <text x="200" y="318" font-size="12" fill="#8b949e">audite les .github/workflows eux-mêmes</text>

  <!-- Arrow: converge -->
  <line x1="320" y1="332" x2="320" y2="368" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="330" y="354" font-size="11" fill="#3fb950" text-anchor="start">tout vert ✓</text>

  <!-- ── Box: merge ── -->
  <rect x="80" y="372" width="480" height="52" fill="none" rx="8" stroke="#30363d" stroke-width="1.5"/>
  <rect x="80" y="372" width="4" height="52" fill="#3fb950" rx="2"/>
  <text x="320" y="403" font-size="14" fill="#e6edf3" font-weight="600" text-anchor="middle">merge sur main</text>

  <!-- Arrow: tag (handoff) -->
  <line x1="320" y1="424" x2="320" y2="460" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="330" y="446" font-size="11" fill="#8b949e" text-anchor="start">git tag vX.Y.Z</text>

  <!-- ── Box: GoReleaser (autre article) ── -->
  <rect x="80" y="464" width="480" height="72" fill="none" rx="8" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="80" y="464" width="4" height="72" fill="#f78166" rx="2"/>
  <text x="106" y="488" font-size="11" fill="#f78166" font-weight="700" letter-spacing="0.5">GORELEASER — release</text>
  <text x="106" y="509" font-size="14" fill="#e6edf3" font-weight="600">binaires multi-arch · images OCI · cosign · Homebrew</text>
  <text x="106" y="528" font-size="12" fill="#8b949e">hors périmètre CI — voir l'article dédié</text>

</svg>
