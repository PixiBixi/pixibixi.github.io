<svg width="640" height="340" viewBox="0 0 640 340" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif">

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b949e"/>
    </marker>
  </defs>

  <!-- Column headers -->
  <text x="20" y="15" font-size="12" fill="#3fb950" font-weight="700">cocogitto</text>
  <text x="340" y="15" font-size="12" fill="#f78166" font-weight="700">release-please</text>

  <!-- Separator -->
  <line x1="320" y1="0" x2="320" y2="340" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ═══ COCOGITTO ═══ -->

  <!-- Step 1 -->
  <rect x="20" y="22" width="280" height="56" fill="none" rx="8" stroke="#30363d" stroke-width="1.5"/>
  <rect x="20" y="22" width="4" height="56" fill="#58a6ff" rx="2"/>
  <text x="44" y="46" font-size="13" fill="#e6edf3" font-weight="600">push feat: → master</text>
  <text x="44" y="64" font-size="11" fill="#8b949e">Commit poussé directement sur master</text>
  <line x1="160" y1="78" x2="160" y2="98" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="20" y="102" width="280" height="56" fill="none" rx="8" stroke="#30363d" stroke-width="1.5"/>
  <rect x="20" y="102" width="4" height="56" fill="#3fb950" rx="2"/>
  <text x="44" y="126" font-size="13" fill="#e6edf3" font-weight="600">cog check · cog bump</text>
  <text x="44" y="144" font-size="11" fill="#8b949e">Validation + bump semver automatique</text>
  <line x1="160" y1="158" x2="160" y2="178" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="20" y="182" width="280" height="56" fill="none" rx="8" stroke="#30363d" stroke-width="1.5"/>
  <rect x="20" y="182" width="4" height="56" fill="#3fb950" rx="2"/>
  <text x="44" y="206" font-size="13" fill="#e6edf3" font-weight="600">git push · git push tag</text>
  <text x="44" y="224" font-size="11" fill="#8b949e">Tag vX.Y.Z poussé, CHANGELOG mis à jour</text>
  <line x1="160" y1="238" x2="160" y2="258" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="20" y="262" width="280" height="56" fill="none" rx="8" stroke="#30363d" stroke-width="1.5"/>
  <rect x="20" y="262" width="4" height="56" fill="#f78166" rx="2"/>
  <text x="44" y="286" font-size="13" fill="#e6edf3" font-weight="600">GitHub Release · Docker build</text>
  <text x="44" y="304" font-size="11" fill="#8b949e">Release + image OCI en un seul trigger</text>

  <!-- ═══ RELEASE-PLEASE ═══ -->

  <!-- Step 1 -->
  <rect x="340" y="22" width="280" height="56" fill="none" rx="8" stroke="#30363d" stroke-width="1.5"/>
  <rect x="340" y="22" width="4" height="56" fill="#58a6ff" rx="2"/>
  <text x="364" y="46" font-size="13" fill="#e6edf3" font-weight="600">push feat: → master</text>
  <text x="364" y="64" font-size="11" fill="#8b949e">Commit poussé</text>
  <line x1="480" y1="78" x2="480" y2="98" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="340" y="102" width="280" height="56" fill="none" rx="8" stroke="#30363d" stroke-width="1.5"/>
  <rect x="340" y="102" width="4" height="56" fill="#8b949e" rx="2"/>
  <text x="364" y="126" font-size="13" fill="#e6edf3" font-weight="600">CI ouvre une Release PR</text>
  <text x="364" y="144" font-size="11" fill="#8b949e">Accumule les commits depuis la dernière release</text>
  <line x1="480" y1="158" x2="480" y2="178" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3 — manual gate -->
  <rect x="340" y="182" width="280" height="56" fill="none" rx="8" stroke="#f9a825" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="340" y="182" width="4" height="56" fill="#f9a825" rx="2"/>
  <text x="364" y="206" font-size="13" fill="#e6edf3" font-weight="600">✋ review → merge</text>
  <text x="364" y="224" font-size="11" fill="#8b949e">Gate humain — la release attend le merge</text>
  <line x1="480" y1="238" x2="480" y2="258" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="340" y="262" width="280" height="56" fill="none" rx="8" stroke="#30363d" stroke-width="1.5"/>
  <rect x="340" y="262" width="4" height="56" fill="#f78166" rx="2"/>
  <text x="364" y="286" font-size="13" fill="#e6edf3" font-weight="600">GitHub Release</text>
  <text x="364" y="304" font-size="11" fill="#8b949e">Créée automatiquement après le merge</text>

</svg>
